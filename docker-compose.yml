 # 生产前端（基于Nginx）
#  frontend:
#    build: ./frontend
#    container_name: spare-part-frontend  
#    depends_on:
#      - fastapi
#    ports:
#      - "3000:80"
#    networks:
#      - spare-part-network
#    restart: unless-stopped
#    environment:
#      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8888/api/v1}
    # 生产环境不挂载源代码

  # 开发前端（基于Vite开发服务器）
  frontend-dev:
    image: spare_part_system-frontend-dev:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: spare-part-frontend-dev
    depends_on:
      - fastapi
      - minio
    ports:
      - "5173:5173"
      - "13000:3000"
    networks:
      - spare-part-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Docker 内 Vite 代理需指向后端服务名，否则 /api 会连到本容器
      VITE_PROXY_TARGET: "http://fastapi:8000"
      # MinIO 代理目标（Docker 内使用服务名）
      VITE_MINIO_PROXY_TARGET: "http://minio:9000"
      # 工厂新媒体代理部署时在 .env 中设 VITE_BASE_PATH=/zs2sbgl/，白码为 /spare/，留空则根路径
      VITE_BASE_PATH: "${VITE_BASE_PATH:-}"
    env_file:
      - ./frontend/.env.development      
#    environment (legacy):
#      NODE_ENV: development
#      DOCKER: "true"  # 告诉Vite在Docker环境中运行
#      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.vite
    stdin_open: true
    tty: true

  nginx:
    image: nginx:alpine
    container_name: spare-part-nginx
    # 白码已占用 80/443，本项目对外使用 8080/8443
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./ssl:/etc/nginx/ssl
      # 工厂外网：打包好的前端 dist 挂在此路径，nginx 优先走静态；空目录时回退到 frontend-dev
      - ./frontend/dist:/usr/share/nginx/html/zs2sbgl
    depends_on:
      - frontend-dev
      - fastapi
      - minio
    networks:
      - spare-part-network

networks:
  spare-part-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  django_static:
  django_media:
  minio_data:
  #frontend_data: