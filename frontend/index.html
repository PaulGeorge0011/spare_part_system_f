<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="./favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script>
      (function() {
        try {
          if (window.self === window.top) return;
          var ua = navigator.userAgent || '';
          if (!/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|mobile/i.test(ua)) return;
          var meta = document.querySelector('meta[name="viewport"]');
          if (meta) meta.setAttribute('content', 'width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover');
        } catch (e) {}
      })();
    </script>
    <title>Vite App</title>
  </head>
  <body>
    <div id="iframe-mobile-scaler">
      <div id="app"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
