worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
    
    # 基本设置
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # 文件上传大小限制
    client_max_body_size 10M;
    
    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/atom+xml image/svg+xml;
    
    # 包含各个服务的配置
    include /etc/nginx/conf.d/*.conf;
    
    # Docker 内部 DNS，用于运行时解析（避免 upstream 在启动时解析失败导致 nginx 无法启动）
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ---- 反向代理兼容 ----
    # 当白码 Nginx 作为前置代理时，请求以 HTTP 到达本 Nginx（80 端口），
    # 但原始协议实际为 HTTPS。通过 map 继承上游传来的 X-Forwarded-Proto，
    # 确保后端服务能正确识别原始协议。
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    # 信任来自宿主机（白码 Nginx）的真实 IP
    set_real_ip_from 172.16.0.0/12;   # Docker 默认网段
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # ==================== HTTP 服务（端口 80 → 主机 8080）====================
    # 直接访问:  http://IP:8080
    # 反向代理:  白码 Nginx (443) → http://127.0.0.1:8080
    server {
        listen 80;
        server_name _;   # 接受任意域名（含反向代理转发的子域名）

        # 允许被白码 iframe 嵌入
        add_header Content-Security-Policy "frame-ancestors 'self' https://haodaapp.yxjyc.com https://*.yxjyc.com" always;

        # WebSocket 专用（优先匹配，工厂代理转发后请求路径为 /api/v1/ws/...）
        location /api/v1/ws/ {
            proxy_pass http://fastapi:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # 二级目录 /zs2sbgl 下的 API（直连 8080 且前端 base 为 /zs2sbgl 时，请求会带此前缀）
        location /zs2sbgl/api/ {
            rewrite ^/zs2sbgl(.*)$ $1 break;
            proxy_pass http://fastapi:8000;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # 二级目录下的 MinIO（直连 8080 且 base 为 /zs2sbgl 时）
        location /zs2sbgl/minio/ {
            rewrite ^/zs2sbgl/minio/(.*)$ /$1 break;
            proxy_pass http://minio:9000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # 二级目录下的 Django 管理后台
        location /zs2sbgl/admin/ {
            rewrite ^/zs2sbgl(.*)$ $1 break;
            proxy_pass http://$django_admin_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        # 前端：优先使用打包静态 dist（工厂代理仅转发 /zs2sbgl/，会得到 GET / 与 GET /assets/xxx）
        # 若 dist 未部署则回退到 frontend-dev，保证内网开发可用

        # 内网直连 8080 且带前缀 /zs2sbgl/ 时，直接从挂载的 dist 目录读取静态文件
        # 例如 http://172.24.69.125:8080/zs2sbgl/ 和 /zs2sbgl/assets/xxx
        location ^~ /zs2sbgl/ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /zs2sbgl/index.html;
        }

        # 工厂代理访问：location /zs2sbgl/ { proxy_pass http://IP:8080/; }
        # 到本机后变成 GET / 与 GET /assets/xxx，这里再映射到 /zs2sbgl 下的静态文件
        location / {
            root /usr/share/nginx/html;
            try_files /zs2sbgl$uri /zs2sbgl$uri/ /zs2sbgl/index.html @frontend_dev;
        }
        location @frontend_dev {
            # 仅当请求无 /zs2sbgl 前缀时补上，内网直连 /zs2sbgl/ 不再加前缀
            rewrite ^/zs2sbgl$ /zs2sbgl/ break;
            rewrite ^/(?!zs2sbgl/)(.*)$ /zs2sbgl/$1 break;
            proxy_pass http://frontend-dev:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }
        
        # FastAPI API代理
        location /api/ {
            proxy_pass http://fastapi:8000;
            
            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
            
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
        
        # MinIO图片静态资源访问
        location /minio/ {
            # 删除/minio/前缀，代理到MinIO
            rewrite ^/minio/(.*)$ /$1 break;
            proxy_pass http://minio:9000;
            
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            
            # 图片缓存设置
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        
        # Django管理后台（使用变量实现运行时解析，django-admin 未启动时 nginx 仍可启动）
        set $django_admin_upstream django-admin:8001;
        location /admin/ {
            proxy_pass http://$django_admin_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }
        
        # 健康检查
        location /health {
            access_log off;
            return 200 "healthy\n";
        }
    }

    # ==================== HTTPS 服务（端口 443）====================
    # 默认不启用：无证书时 Nginx 会启动失败。需启用时：
    # 1. 在项目根执行: bash ssl/generate-cert.sh 生成自签名证书
    # 2. 复制: cp nginx/ssl.conf.example nginx/conf.d/ssl.conf
    # 3. 重启 nginx（conf.d/*.conf 会被自动 include）
}